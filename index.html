<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASTROGURUJI</title>
  <style>
    body {
      margin: 0;
      background: #efefef;
      font-family: Arial, Helvetica, sans-serif;
      text-transform: uppercase;
    }

    .page {
      width: 1180px;
      margin: 12px auto;
      background: #fff;
      border: 2px solid #111;
      padding: 10px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 180px 70px 70px 90px 70px 70px 130px 180px 180px 90px;
      gap: 6px;
      margin-bottom: 18px;
    }

    .input-row input,
    .input-row select,
    .input-row button {
      height: 32px;
      border: 1px solid #111;
      padding: 4px 8px;
      font-size: 14px;
      text-transform: uppercase;
    }

    .input-row button {
      background: #f1cf3a;
      font-weight: 700;
      cursor: pointer;
    }

    .main {
      display: grid;
      grid-template-columns: 540px 1fr;
      gap: 20px;
      align-items: start;
    }

    .south-chart-wrap {
      border: 2px solid #111;
      padding: 0;
      width: 540px;
      height: 540px;
      background: #fff;
    }

    .south-chart {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      width: 100%;
      height: 100%;
    }

    .chart-cell {
      border: 1px solid #111;
      padding: 6px;
      font-size: 13px;
      line-height: 1.25;
      position: relative;
      white-space: pre-line;
      overflow: hidden;
    }

    .chart-sign {
      font-size: 11px;
      font-weight: 700;
      color: #444;
      position: absolute;
      top: 4px;
      right: 6px;
    }

    .chart-text {
      margin-top: 18px;
      font-weight: 700;
    }

    .planet-box {
      border: 2px solid #111;
      padding: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      border: 1px solid #111;
      padding: 7px 8px;
      font-size: 13px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f3f3f3;
      font-weight: 700;
    }

    .footer-box {
      border: 2px solid #111;
      margin-top: 14px;
      padding: 10px 12px;
      font-size: 15px;
      line-height: 1.7;
      min-height: 70px;
    }

    .error {
      margin-top: 10px;
      color: #b00020;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="title">ASTROGURUJI</div>

    <div class="input-row">
      <input id="name" placeholder="Name" />
      <input id="day" placeholder="DD" maxlength="2" />
      <input id="month" placeholder="MM" maxlength="2" />
      <input id="year" placeholder="YYYY" maxlength="4" />
      <input id="hour" placeholder="HH" maxlength="2" />
      <input id="minute" placeholder="MM" maxlength="2" />
      <select id="country"></select>
      <select id="state"></select>
      <select id="city"></select>
      <button id="showBtn">SHOW</button>
    </div>

    <div class="main">
      <div class="south-chart-wrap">
        <div class="south-chart" id="rasiChart"></div>
      </div>

      <div class="planet-box">
        <table id="planetTable">
          <thead>
            <tr>
              <th style="width: 22%;">Planet</th>
              <th style="width: 18%;">Sign</th>
              <th style="width: 22%;">Degree</th>
              <th style="width: 22%;">Nakshatra</th>
              <th style="width: 16%;">Lord</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="footer-box" id="dashaBox">
      bal. of dasa:<br>
      present dasa running:
    </div>

    <div id="errorBox" class="error"></div>
  </div>

  <script src="/india_locations.js"></script>
  <script>
    const countryEl = document.getElementById("country");
    const stateEl = document.getElementById("state");
    const cityEl = document.getElementById("city");
    const showBtn = document.getElementById("showBtn");
    const errorBox = document.getElementById("errorBox");

    const chartLayout = [
      "Aries", "Taurus", "Gemini", "Cancer",
      "Pisces", null, null, "Leo",
      "Aquarius", null, null, "Virgo",
      "Capricorn", "Sagittarius", "Scorpio", "Libra"
    ];

    function fillCountries() {
      countryEl.innerHTML = "";
      const opt = document.createElement("option");
      opt.value = "India";
      opt.textContent = "India";
      countryEl.appendChild(opt);
    }

    function fillStates() {
      stateEl.innerHTML = "<option value=''>State</option>";
      Object.keys(INDIA_LOCATIONS).sort().forEach((state) => {
        const opt = document.createElement("option");
        opt.value = state;
        opt.textContent = state;
        stateEl.appendChild(opt);
      });
    }

    function fillCities(state) {
      cityEl.innerHTML = "<option value=''>City</option>";
      (INDIA_LOCATIONS[state] || []).forEach((city) => {
        const opt = document.createElement("option");
        opt.value = city;
        opt.textContent = city;
        cityEl.appendChild(opt);
      });
    }

    stateEl.addEventListener("change", () => fillCities(stateEl.value));

    async function getLocation(city, state, country) {
      const q = `${city}, ${state}, ${country}`;
      const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q)}`;
      const res = await fetch(url, { headers: { "Accept": "application/json" } });
      const data = await res.json();
      if (!Array.isArray(data) || data.length === 0) {
        throw new Error("Could not resolve latitude and longitude for selected city.");
      }
      return {
        lat: parseFloat(data[0].lat),
        lon: parseFloat(data[0].lon)
      };
    }

    function validateInput() {
      const name = document.getElementById("name").value.trim();
      const day = document.getElementById("day").value.trim();
      const month = document.getElementById("month").value.trim();
      const year = document.getElementById("year").value.trim();
      const hour = document.getElementById("hour").value.trim();
      const minute = document.getElementById("minute").value.trim();
      const country = countryEl.value.trim();
      const state = stateEl.value.trim();
      const city = cityEl.value.trim();

      if (!name || !day || !month || !year || !hour || !minute || !country || !state || !city) {
        throw new Error("Please enter name, date, month, year, time, country, state, and city.");
      }

      return {
        name,
        day: day.padStart(2, "0"),
        month: month.padStart(2, "0"),
        year,
        hour: hour.padStart(2, "0"),
        minute: minute.padStart(2, "0"),
        country,
        state,
        city
      };
    }

    function renderPlanetTable(data) {
      const tbody = document.querySelector("#planetTable tbody");
      const rows = [];

      rows.push({
        planet: "Lagnam",
        sign: data.lagna.sign,
        degree: `${Number(data.lagna.degree_in_sign).toFixed(2)}°`,
        nakshatra: "-",
        lord: "-"
      });

      const order = ["Sun", "Moon", "Mars", "Mercury", "Jupiter", "Venus", "Saturn", "Rahu", "Ketu"];

      order.forEach((p) => {
        const g = data.graha_positions[p];
        rows.push({
          planet: p,
          sign: g.sign,
          degree: `${Number(g.degree_in_sign).toFixed(2)}°`,
          nakshatra: g.nakshatra,
          lord: g.nakshatra_lord
        });
      });

      tbody.innerHTML = rows.map((r) => `
        <tr>
          <td>${r.planet}</td>
          <td>${r.sign}</td>
          <td>${r.degree}</td>
          <td>${r.nakshatra}</td>
          <td>${r.lord}</td>
        </tr>
      `).join("");
    }

    function renderSouthChart(data) {
      const container = document.getElementById("rasiChart");
      const chartData = data.rasi_chart;   // critical fix: use rasi_chart, not chart

      container.innerHTML = "";

      chartLayout.forEach((sign) => {
        const cell = document.createElement("div");
        cell.className = "chart-cell";

        if (!sign) {
          cell.style.background = "#fff";
          container.appendChild(cell);
          return;
        }

        const signLabel = document.createElement("div");
        signLabel.className = "chart-sign";
        signLabel.textContent = sign;

        const text = document.createElement("div");
        text.className = "chart-text";

        const occupants = chartData[sign] || [];
        text.textContent = occupants.length ? occupants.join(", ") : "";

        cell.appendChild(signLabel);
        cell.appendChild(text);
        container.appendChild(cell);
      });
    }

    function renderDasha(data) {
      const bal = data.core_result.balance;
      const cur = data.core_result.current_dasha;

      document.getElementById("dashaBox").innerHTML = `
        <div><b>bal. of dasa:</b> ${bal.years} years, ${bal.months} months, ${bal.days} days</div>
        <div><b>present dasa running:</b> ${cur.lord} (${cur.start} to ${cur.end})</div>
      `;
    }

    async function calculate() {
      errorBox.textContent = "";

      try {
        const input = validateInput();
        const dob = `${input.year}-${input.month}-${input.day}`;
        const tob = `${input.hour}:${input.minute}`;

        const location = await getLocation(input.city, input.state, input.country);

        const res = await fetch("/calculate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: input.name,
            dob,
            tob,
            tz: 5.5,
            lat: location.lat,
            lon: location.lon,
            country: input.country,
            state: input.state,
            city: input.city
          })
        });

        if (!res.ok) {
          throw new Error("Calculation request failed.");
        }

        const data = await res.json();

        renderPlanetTable(data);
        renderSouthChart(data);
        renderDasha(data);

      } catch (err) {
        errorBox.textContent = err.message || "Unexpected error.";
      }
    }

    showBtn.addEventListener("click", calculate);

    fillCountries();
    fillStates();
  </script>
</body>
</html>
