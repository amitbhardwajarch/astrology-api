<!DOCTYPE html>
<html>
<head>
    <title>Astrology Software</title>
</head>
<body>

<h2>Astrology Calculator</h2>

<form id="astroForm">
    DOB: <input type="date" id="dob"><br><br>
    Time: <input type="time" id="tob"><br><br>
    Timezone: <input type="number" step="0.1" id="tz" value="5.5"><br><br>
    Latitude: <input type="text" id="lat" value="28.4595"><br><br>
    Longitude: <input type="text" id="lon" value="77.0266"><br><br>

    <button type="submit">Calculate</button>
</form>

<h3>Result</h3>
<pre id="result"></pre>

<script>
document.getElementById("astroForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        dob: document.getElementById("dob").value,
        tob: document.getElementById("tob").value,
        tz: parseFloat(document.getElementById("tz").value),
        lat: parseFloat(document.getElementById("lat").value),
        lon: parseFloat(document.getElementById("lon").value)
    };

    const response = await fetch("http://127.0.0.1:8000/calculate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();
    document.getElementById("result").textContent = JSON.stringify(result, null, 2);
});
</script>

</body>
</html>
