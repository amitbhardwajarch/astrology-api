<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASTROGURUJI - FINAL</title>
  <style>
    body {
      margin: 0;
      background: #efefef;
      font-family: Arial, Helvetica, sans-serif;
      text-transform: uppercase;
    }

    .page {
      width: 1220px;
      margin: 12px auto;
      background: #fff;
      border: 2px solid #111;
      padding: 10px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 70px 70px 90px 70px 70px 120px 180px 180px 90px;
      gap: 6px;
      margin-bottom: 18px;
    }

    .input-row input,
    .input-row select,
    .input-row button {
      height: 32px;
      border: 1px solid #111;
      padding: 4px 8px;
      font-size: 14px;
      background: #fff;
      text-transform: uppercase;
    }

    .input-row button {
      background: #f1cf3a;
      font-weight: 700;
      cursor: pointer;
    }

    .main {
      display: grid;
      grid-template-columns: 700px 1fr;
      gap: 18px;
      align-items: start;
    }

    .south-chart-wrap {
      border: 2px solid #111;
      width: 700px;
      height: 700px;
      background: #fff;
    }

    .south-chart {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      width: 100%;
      height: 100%;
    }

    .chart-cell {
      border: 1px solid #111;
      padding: 6px;
      position: relative;
      white-space: pre-line;
      overflow: hidden;
      font-size: 14px;
      line-height: 1.25;
    }

    .chart-cell.empty {
      background: #fff;
    }

    .chart-sign {
      font-size: 13px;
      font-weight: 700;
      position: absolute;
      top: 4px;
      left: 6px;
    }

    .chart-text {
      margin-top: 30px;
      font-weight: 700;
    }

    .planet-box {
      border: 2px solid #111;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      border: 1px solid #111;
      padding: 6px;
      font-size: 13px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #eee;
    }

    .footer-box {
      border: 2px solid #111;
      margin-top: 14px;
      padding: 10px;
      font-size: 14px;
      line-height: 1.8;
      min-height: 74px;
    }

    .error {
      margin-top: 10px;
      color: red;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="title">ASTROGURUJI</div>

    <div class="input-row">
      <input id="day" placeholder="DD" maxlength="2" />
      <input id="month" placeholder="MM" maxlength="2" />
      <input id="year" placeholder="YYYY" maxlength="4" />
      <input id="hour" placeholder="HH" maxlength="2" />
      <input id="minute" placeholder="MM" maxlength="2" />
      <select id="country"></select>
      <select id="state"></select>
      <select id="city"></select>
      <button id="showBtn" type="button">SHOW</button>
    </div>

    <div class="main">
      <div class="south-chart-wrap">
        <div class="south-chart" id="rasiChart"></div>
      </div>

      <div class="planet-box">
        <table id="planetTable">
          <thead>
            <tr>
              <th>Planet</th>
              <th>Sign</th>
              <th>Degree</th>
              <th>Nakshatra</th>
              <th>Lord</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="footer-box" id="dashaBox">
      <b>Bal of Dasa:</b> -<br>
      <b>Present Dasa:</b> -<br>
      <b>Asc Nakshatra:</b> -<br>
      <b>Nakshatra Lord:</b> -<br>
      <b>Sub Lord:</b> -<br>
      <b>Sub Sub Lord:</b> -
    </div>

    <div id="errorBox" class="error"></div>

  </div>

  <script src="/india_locations.js"></script>
  <script>
    const chartLayout = [
      "Pisces", "Aries", "Taurus", "Gemini",
      "Aquarius", null, null, "Cancer",
      "Capricorn", null, null, "Leo",
      "Sagittarius", "Scorpio", "Libra", "Virgo"
    ];

    const signNumbers = {
      Aries: 1,
      Taurus: 2,
      Gemini: 3,
      Cancer: 4,
      Leo: 5,
      Virgo: 6,
      Libra: 7,
      Scorpio: 8,
      Sagittarius: 9,
      Capricorn: 10,
      Aquarius: 11,
      Pisces: 12
    };

    const countryEl = document.getElementById("country");
    const stateEl = document.getElementById("state");
    const cityEl = document.getElementById("city");
    const showBtn = document.getElementById("showBtn");
    const errorBox = document.getElementById("errorBox");

    function initDropdowns() {
      countryEl.innerHTML = "<option value='India'>India</option>";

      stateEl.innerHTML = "<option value=''>Select State</option>";
      Object.keys(INDIA_LOCATIONS).sort().forEach((state) => {
        stateEl.innerHTML += `<option value="${state}">${state}</option>`;
      });

      cityEl.innerHTML = "<option value=''>Select City</option>";

      stateEl.onchange = () => {
        cityEl.innerHTML = "<option value=''>Select City</option>";
        const cities = INDIA_LOCATIONS[stateEl.value] || [];
        cities.forEach((city) => {
          cityEl.innerHTML += `<option value="${city}">${city}</option>`;
        });
      };

      if (stateEl.options.length > 1) {
        stateEl.selectedIndex = 1;
        stateEl.onchange();
        if (cityEl.options.length > 1) {
          cityEl.selectedIndex = 1;
        }
      }
    }

    function validateInput() {
      const day = document.getElementById("day").value.trim();
      const month = document.getElementById("month").value.trim();
      const year = document.getElementById("year").value.trim();
      const hour = document.getElementById("hour").value.trim();
      const minute = document.getElementById("minute").value.trim();
      const country = countryEl.value.trim();
      const state = stateEl.value.trim();
      const city = cityEl.value.trim();

      if (!day || !month || !year || !hour || !minute || !country || !state || !city) {
        throw new Error("Please enter date, month, year, time, country, state, and city.");
      }

      return {
        day: day.padStart(2, "0"),
        month: month.padStart(2, "0"),
        year,
        hour: hour.padStart(2, "0"),
        minute: minute.padStart(2, "0"),
        country,
        state,
        city
      };
    }

    async function getLocation(city, state, country) {
      const query = `${city}, ${state}, ${country}`;
      const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`;
      const res = await fetch(url, {
        headers: { "Accept": "application/json" }
      });
      const data = await res.json();

      if (!Array.isArray(data) || data.length === 0) {
        throw new Error("Could not resolve latitude and longitude for selected city.");
      }

      return {
        lat: parseFloat(data[0].lat),
        lon: parseFloat(data[0].lon)
      };
    }

    function renderChart(data) {
      const container = document.getElementById("rasiChart");
      container.innerHTML = "";

      chartLayout.forEach((sign) => {
        const cell = document.createElement("div");
        cell.className = "chart-cell";

        if (!sign) {
          cell.classList.add("empty");
          container.appendChild(cell);
          return;
        }

        const occupants = (data.rasi_chart && data.rasi_chart[sign]) ? data.rasi_chart[sign] : [];
        cell.innerHTML = `
          <div class="chart-sign">${signNumbers[sign]} ${sign}</div>
          <div class="chart-text">${occupants.join(", ")}</div>
        `;
        container.appendChild(cell);
      });
    }

    function renderTable(data) {
      const tbody = document.querySelector("#planetTable tbody");
      tbody.innerHTML = "";

      const addRow = (planet, details) => {
        const degree = typeof details.degree_in_sign === "number"
          ? details.degree_in_sign.toFixed(2)
          : "-";

        const sign = details.sign || "-";
        const nakshatra = details.nakshatra || "-";
        const lord = details.nakshatra_lord || "-";

        tbody.innerHTML += `
          <tr>
            <td>${planet}</td>
            <td>${sign}</td>
            <td>${degree}</td>
            <td>${nakshatra}</td>
            <td>${lord}</td>
          </tr>
        `;
      };

      addRow("Lagna", data.lagna || {});

      ["Sun", "Moon", "Mars", "Mercury", "Jupiter", "Venus", "Saturn", "Rahu", "Ketu"]
        .forEach((planet) => addRow(planet, (data.graha_positions && data.graha_positions[planet]) || {}));
    }

    function renderDasha(data) {
      const bal = (data.core_result && data.core_result.balance) || {};
      const cur = (data.core_result && data.core_result.current_dasha) || {};
      const asc = data.ascendant_details || {};

      document.getElementById("dashaBox").innerHTML = `
        <b>Bal of Dasa:</b> ${bal.years ?? "-"}y ${bal.months ?? "-"}m ${bal.days ?? "-"}d<br>
        <b>Present Dasa:</b> ${cur.lord ?? "-"} (${cur.start ?? "-"} to ${cur.end ?? "-"})<br>
        <b>Asc Nakshatra:</b> ${asc.nakshatra ?? "-"}<br>
        <b>Nakshatra Lord:</b> ${asc.nakshatra_lord ?? "-"}<br>
        <b>Sub Lord:</b> ${asc.sub_lord ?? "-"}<br>
        <b>Sub Sub Lord:</b> ${asc.sub_sub_lord ?? "-"}
      `;
    }

    async function calculate() {
      errorBox.innerText = "";

      try {
        const input = validateInput();
        const dob = `${input.year}-${input.month}-${input.day}`;
        const tob = `${input.hour}:${input.minute}`;

        const location = await getLocation(input.city, input.state, input.country);

        const res = await fetch("/calculate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            dob: dob,
            tob: tob,
            tz: 5.5,
            lat: location.lat,
            lon: location.lon,
            country: input.country,
            state: input.state,
            city: input.city
          })
        });

        if (!res.ok) {
          throw new Error("Calculation request failed.");
        }

        const data = await res.json();
        console.log("API RESPONSE:", data);

        renderChart(data);
        renderTable(data);
        renderDasha(data);

      } catch (e) {
        errorBox.innerText = e.message || "Unexpected error";
      }
    }

    showBtn.onclick = calculate;

    initDropdowns();
  </script>
</body>
</html>
